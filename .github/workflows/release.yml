name: Release

# Push a version tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`) to build the Rust/Tauri
# app for Windows + macOS plus the IntelliJ plugin, and attach everything to a GitHub Release
# (created if missing, assets clobbered if re-run). `workflow_dispatch` builds without releasing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---- The single-binary Rust app (GUI + hook recorder + installer) ----
  app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: claude-sessions.exe
            asset: ClaudeSessions-win-x64
          - os: macos-latest
            bin: claude-sessions
            asset: ClaudeSessions-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Cargo build (release)
        working-directory: session-status/app
        run: cargo build --release
      - name: Stage package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          cp "session-status/app/target/release/${{ matrix.bin }}" stage/
          cat > stage/INSTALL.txt <<'EOF'
          Claude Sessions

          1. Put the binary somewhere permanent (e.g. your home directory).
          2. Run it. The widget appears top-right and lives in the tray/menu bar;
             first launch wires the Claude Code hooks automatically (undo with:
             claude-sessions uninstall).
          3. Start a NEW Claude Code session to populate the widget.

          Unsigned build: Windows SmartScreen / macOS Gatekeeper will warn once.
          EOF
          cd stage
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "../${{ matrix.asset }}.zip" ./*
          else
            zip -r "../${{ matrix.asset }}.zip" .
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.zip

  # ---- IntelliJ plugin: gradle buildPlugin -> distributable .zip ----
  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: build/distributions/*.zip

  # ---- Publish: attach all artifacts to the tag's Release ----
  release:
    needs: [app, plugin]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
