<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Claude sessions</title>
<style>
  /* Ported from floatdash.swift / MainWindow.cs — same colours, sizes and effects. */
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; cursor:default; }
  html, body { background:transparent; overflow:hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #panel {
    margin:14px;                              /* gutter the drop shadow falls into */
    background:#1a1a1a;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.165);
    /* Must fully fade inside the 14px gutter or it clips with a hard edge. */
    box-shadow:0 4px 9px rgba(0,0,0,.45), 0 1px 4px rgba(0,0,0,.4);
    overflow:hidden;
  }

  header { height:28px; display:flex; align-items:center; padding:0 8px; }
  header .title { flex:1; text-align:center; font-size:11.5px; color:#98989E; pointer-events:none; }
  .disc {
    width:18px; height:18px; border-radius:9px; flex:none;
    display:flex; align-items:center; justify-content:center;
    color:#98989E; font-size:14px; line-height:1; cursor:pointer;
  }
  .disc:hover { color:#ECECEC; background:rgba(255,255,255,.13); }
  #plus { font-size:15px; }

  #list { padding:4px 6px; overflow-y:auto; overflow-x:hidden; }
  #list::-webkit-scrollbar { width:0; }

  .row {
    position:relative; height:24px;
    display:flex; align-items:center;
    cursor:pointer;
  }
  .row::before {                              /* right-to-left state glow */
    content:""; position:absolute; left:2px; right:2px; top:1px; bottom:1px;
    border-radius:6px;
    background:linear-gradient(90deg, transparent 30%, var(--glow, transparent) 100%);
  }
  .row::after {                               /* hover bloom that follows the cursor */
    content:""; position:absolute; left:4px; right:4px; top:1px; bottom:1px;
    border-radius:6px; opacity:0; pointer-events:none;
    background:radial-gradient(95px circle at var(--mx, 50%) 50%, rgba(255,255,255,.13), transparent);
  }
  .row:hover::after { opacity:1; }
  .bar {
    width:3px; height:16px; border-radius:1.5px; flex:none;
    margin-left:7px; position:relative; background:var(--col, #5A5A5E);
  }
  .name {
    flex:1; min-width:0; position:relative;
    margin-left:4px; font-size:11.5px; color:#ECECEC;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .name input {
    width:100%; font:inherit; color:#ECECEC; background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.2); border-radius:4px; padding:1px 4px; outline:none;
    user-select:text; -webkit-user-select:text; cursor:text;
  }
  .meta {
    flex:none; position:relative;
    margin:0 11px 0 8px; font-size:10px; color:#98989E;
  }
  .row.muted .name, .row.muted .meta { color:#6A6A6E; }
  .row.muted .bar { background:#6A6A6E; }

  #empty { text-align:center; padding:16px 0; font-size:12px; color:#6A6A6E; }

  #settings { display:none; padding:8px 14px 10px; }
  #settings label { display:block; font-size:11.5px; color:#ECECEC; margin-bottom:5px; }
  #settings select {
    width:100%; margin-bottom:9px; outline:none;
    background:rgba(255,255,255,.06); color:#ECECEC;
    border:1px solid rgba(255,255,255,.18); border-radius:6px;
    padding:4px 6px; font-size:11.5px;
  }
  #settings select option { background:#2b2b2b; color:#ECECEC; }
  #settings textarea {
    width:100%; resize:none; outline:none;
    background:rgba(255,255,255,.06); color:#ECECEC;
    border:1px solid rgba(255,255,255,.18); border-radius:6px;
    padding:6px 8px; font:11.5px Consolas, monospace;
    user-select:text; -webkit-user-select:text; cursor:text;
  }
  #settings textarea:focus { border-color:rgba(255,255,255,.35); }
  #settings .hint { font-size:10px; color:#98989E; margin-top:5px; line-height:1.5; }
  #settings .hint code { color:#ECECEC; font-family:Consolas, monospace; }
  #settings .hint kbd {
    font:10px Consolas, monospace; color:#ECECEC; background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.18); border-radius:3px; padding:0 3px;
  }
  #settings .hkrow {
    display:flex; align-items:center; justify-content:space-between;
    gap:8px; margin-top:6px; font-size:11.5px; color:#ECECEC;
  }
  #settings .shortcut {
    min-width:96px; text-align:center; padding:4px 8px; cursor:pointer;
    font:11.5px Consolas, monospace; color:#ECECEC;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.18);
    border-radius:6px; outline:none; user-select:none; -webkit-user-select:none;
  }
  #settings .shortcut:hover { background:rgba(255,255,255,.1); }
  #settings .shortcut.recording {
    color:#98989E; border-color:rgba(52,199,89,.7); background:rgba(52,199,89,.1);
  }
  #settings .btnrow { display:flex; gap:8px; margin-top:9px; }
  #settings button {
    flex:1; padding:5px 0; font:11.5px inherit; color:#ECECEC; cursor:pointer;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); border-radius:6px;
  }
  #settings button:hover { background:rgba(255,255,255,.14); }
  #settings #save { background:rgba(52,199,89,.18); border-color:rgba(52,199,89,.4); }
  #settings #save:hover { background:rgba(52,199,89,.3); }

  #sep { height:1px; background:#333; margin:0 14px; }

  footer { position:relative; padding:7px 0 9px; }
  footer #gear {
    position:absolute; right:7px; top:50%; transform:translateY(-55%);
    font-size:12px; color:#6A6A6E;
  }
  footer #gear:hover { color:#ECECEC; }
  #chips { display:flex; justify-content:center; gap:14px; }
  .chip { display:flex; align-items:center; gap:4px; pointer-events:none; }
  .chip .dot {
    width:11px; height:11px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:8px; font-weight:700; color:#1a1a1a; line-height:1;
  }
  .chip .n { font-size:11.5px; font-weight:600; color:#ECECEC; }
  .chip.zero .n { color:#6A6A6E; }
</style>
</head>
<body>
<div id="panel">
  <header data-tauri-drag-region>
    <div class="disc" id="close" title="Hide to tray">&times;</div>
    <div class="title" data-tauri-drag-region>Claude sessions</div>
    <div class="disc" id="plus" title="New Claude session">+</div>
  </header>
  <div id="list"></div>
  <div id="settings">
    <label for="term">Open new sessions in</label>
    <select id="term"></select>
    <label for="cmd">New-session command</label>
    <textarea id="cmd" rows="3" spellcheck="false"></textarea>
    <div class="hint">Typed into the new terminal tab, one line per command — so your shell aliases work (e.g. <code>prog</code> then <code>c</code>).</div>
    <label>Global shortcuts</label>
    <div class="hkrow">
      <span>Jump to top session</span>
      <div class="shortcut" id="hk-jump" tabindex="0" title="Click, then press a shortcut"></div>
    </div>
    <div class="hkrow">
      <span>New session</span>
      <div class="shortcut" id="hk-new" tabindex="0" title="Click, then press a shortcut"></div>
    </div>
    <div class="hint">Work from anywhere, even when the widget is hidden. Needs at least one modifier (Ctrl/Alt/Shift/⊞). <kbd>Esc</kbd> cancels.</div>
    <div class="btnrow">
      <button id="save">Save</button>
      <button id="cancel">Cancel</button>
    </div>
  </div>
  <div id="sep"></div>
  <footer data-tauri-drag-region>
    <div id="chips" data-tauri-drag-region></div>
    <div class="disc" id="gear" title="Options">&#9881;</div>
  </footer>
</div>

<script>
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;
const appWindow = window.__TAURI__.window.getCurrentWindow();
const { LogicalSize } = window.__TAURI__.dpi;

const COLORS = {
  needs:    "255,69,58",    // systemRed
  yourturn: "255,214,10",   // systemYellow
  working:  "52,199,89",    // systemGreen
  done:     "142,142,147",  // systemGray
  idle:     "90,90,94",
};
const ACTIVE = new Set(["needs", "yourturn", "working"]);
const rgb = s => COLORS[s] || COLORS.idle;

let sessions = [];
let renaming = null;   // session id currently being renamed inline
let settingsOpen = false;
let lastH = 0;
let hkJump = "";       // global-hotkey accelerators (loaded from config, edited in the options pane)
let hkNew = "";


function ageStr(ts) {
  if (!ts) return "";
  const s = Math.max(0, Math.floor(Date.now() / 1000 - ts));
  if (s < 60) return s + "s";
  if (s < 3600) return Math.floor(s / 60) + "m";
  return Math.floor(s / 3600) + "h";
}

function metaFor(s) {
  const now = Date.now() / 1000;
  if (s.mute_until > now) return "muted · " + Math.max(1, Math.ceil((s.mute_until - now) / 60)) + "m";
  const parts = [];
  if (s.terminal === "jetbrains") parts.push("IDE");
  const age = ageStr(s.updated);
  if (age) parts.push(age);
  return parts.join(" · ");
}

function render() {
  if (settingsOpen) return;
  const list = document.getElementById("list");
  list.innerHTML = "";
  if (!sessions.length) {
    list.innerHTML = '<div id="empty">No active sessions</div>';
  }
  const now = Date.now() / 1000;
  for (const s of sessions) {
    const muted = s.mute_until > now;
    const active = ACTIVE.has(s.state);
    const row = document.createElement("div");
    row.className = "row" + (muted ? " muted" : "");
    row.style.setProperty("--col", `rgb(${rgb(s.state)})`);
    if (!muted) {
      row.style.setProperty("--glow", `rgba(${rgb(s.state)},${active ? 0.22 : 0.066})`);
    }

    const bar = document.createElement("div");
    bar.className = "bar";
    const name = document.createElement("div");
    name.className = "name";
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = metaFor(s);
    row.append(bar, name, meta);

    if (renaming === s.id) {
      const input = document.createElement("input");
      input.value = s.topic;
      name.appendChild(input);
      setTimeout(() => { input.focus(); input.select(); }, 0);
      let committed = false;                          // Enter also fires blur; commit once
      const commit = ok => {
        if (committed) return;
        committed = true;
        const v = input.value;
        renaming = null;
        if (ok) invoke("rename", { id: s.id, name: v }).then(refresh);
        else render();
      };
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") commit(true);
        if (e.key === "Escape") commit(false);
        e.stopPropagation();
      });
      input.addEventListener("blur", () => commit(true));
      input.addEventListener("mousedown", e => e.stopPropagation());
    } else {
      name.textContent = s.topic;
      if (!muted && active) name.style.color = `rgb(${rgb(s.state)})`;
    }

    row.addEventListener("mousemove", e => {
      row.style.setProperty("--mx", (e.clientX - row.getBoundingClientRect().left) + "px");
    });
    row.addEventListener("click", e => {
      if (renaming) return;
      if (e.altKey) { renaming = s.id; render(); return; }
      invoke("jump", { id: s.id });
    });
    row.addEventListener("auxclick", e => {           // middle-click → mute 1h
      if (e.button === 1) invoke("toggle_mute", { id: s.id }).then(refresh);
    });
    row.addEventListener("contextmenu", e => {        // right-click → close the session
      e.preventDefault();
      invoke("close_session", { id: s.id });
      setTimeout(refresh, 600);
    });
    list.appendChild(row);
  }
  renderChips();
  fitHeight();
}

function renderChips() {
  const keys = [["needs", "!"], ["yourturn", ""], ["working", ""], ["done", "✓"]];
  const el = document.getElementById("chips");
  el.innerHTML = "";
  for (const [key, glyph] of keys) {
    const n = sessions.filter(s => s.state === key).length;
    const chip = document.createElement("div");
    chip.className = "chip" + (n ? "" : " zero");
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.style.background = n ? `rgb(${rgb(key)})` : "#6A6A6E";
    dot.textContent = glyph;
    const count = document.createElement("div");
    count.className = "n";
    count.textContent = n;
    chip.append(dot, count);
    el.appendChild(chip);
  }
}

function fitHeight() {
  // Cap the list so a long session list scrolls instead of running off the screen.
  const cap = Math.max(120, screen.availHeight - 140);
  document.getElementById("list").style.maxHeight = cap + "px";
  const h = Math.ceil(document.getElementById("panel").getBoundingClientRect().height) + 28;
  if (h !== lastH) {
    lastH = h;
    appWindow.setSize(new LogicalSize(328, h));
  }
}

function refresh() { invoke("load_sessions").then(s => { sessions = s; render(); }); }

document.getElementById("close").addEventListener("click", () => appWindow.hide());
document.getElementById("plus").addEventListener("click", () => invoke("new_session"));
document.addEventListener("contextmenu", e => e.preventDefault());

// ---- options pane (gear) ----
function setSettingsOpen(open) {
  settingsOpen = open;
  document.getElementById("settings").style.display = open ? "block" : "none";
  document.getElementById("list").style.display = open ? "none" : "block";
  if (!open) render();
  fitHeight();
}
document.getElementById("gear").addEventListener("click", () => {
  if (settingsOpen) { setSettingsOpen(false); return; }
  invoke("get_config").then(c => {
    document.getElementById("cmd").value = c.new_session_cmd;
    const sel = document.getElementById("term");
    sel.innerHTML = "";
    for (const t of c.terminals) {
      const o = document.createElement("option");
      o.value = t.id;
      o.textContent = t.label;
      sel.appendChild(o);
    }
    sel.value = c.new_session_terminal;
    hkJump = c.hotkey_jump || "";
    hkNew = c.hotkey_new || "";
    document.getElementById("hk-jump").textContent = fmtAccel(hkJump);
    document.getElementById("hk-new").textContent = fmtAccel(hkNew);
    setSettingsOpen(true);
  });
});
document.getElementById("save").addEventListener("click", () => {
  invoke("set_config", {
    newSessionCmd: document.getElementById("cmd").value,
    newSessionTerminal: document.getElementById("term").value,
    hotkeyJump: hkJump,
    hotkeyNew: hkNew,
  }).then(() => setSettingsOpen(false));
});
document.getElementById("cancel").addEventListener("click", () => setSettingsOpen(false));

// ---- global-shortcut recorder (the ShortcutField analog from menubar.swift) ----
const IS_MAC = navigator.platform.toUpperCase().includes("MAC");
const MOD_CODES = ["ControlLeft","ControlRight","AltLeft","AltRight","ShiftLeft","ShiftRight","MetaLeft","MetaRight"];
const MOD_KEYS = ["Control","Alt","AltGraph","Shift","Meta","OS","CapsLock","NumLock","ScrollLock","Dead"];
function codeLabel(code) {
  if (code.startsWith("Key")) return code.slice(3);
  if (code.startsWith("Digit")) return code.slice(5);
  if (code.startsWith("Numpad")) return "Num" + code.slice(6);
  const map = { Backquote:"`", Minus:"-", Equal:"=", BracketLeft:"[", BracketRight:"]",
    Backslash:"\\", Semicolon:";", Quote:"'", Comma:",", Period:".", Slash:"/", Space:"Space" };
  return map[code] || code;
}
function modLabel(m) {
  const mac = { Control:"⌃", Alt:"⌥", Shift:"⇧", Super:"⌘", CmdOrCtrl:"⌘", CommandOrControl:"⌘" };
  const win = { Control:"Ctrl", Alt:"Alt", Shift:"Shift", Super:"⊞", CmdOrCtrl:"Ctrl", CommandOrControl:"Ctrl" };
  return (IS_MAC ? mac : win)[m] || m;
}
function fmtAccel(accel) {
  if (!accel) return "—";
  const parts = accel.split("+");
  const key = parts.pop();
  const sep = IS_MAC ? "" : "+";
  return [...parts.map(modLabel), codeLabel(key)].join(sep);
}
function bindShortcut(el, get, set) {
  let recording = false;
  const stop = () => { recording = false; el.classList.remove("recording"); el.textContent = fmtAccel(get()); };
  el.addEventListener("click", () => {
    recording = true; el.classList.add("recording"); el.textContent = "Press keys…"; el.focus();
  });
  el.addEventListener("blur", () => { if (recording) stop(); });
  el.addEventListener("keydown", e => {
    if (!recording) return;
    e.preventDefault(); e.stopPropagation();
    if (e.key === "Escape") { stop(); return; }
    // Wait through lone modifier/lock presses — guard on both key and code since injected or
    // exotic events can report an empty e.code.
    if (MOD_KEYS.includes(e.key) || MOD_CODES.includes(e.code)) return;
    const mods = [];
    if (e.ctrlKey) mods.push("Control");
    if (e.altKey) mods.push("Alt");
    if (e.shiftKey) mods.push("Shift");
    if (e.metaKey) mods.push("Super");
    if (!mods.length) return;                          // require at least one modifier
    // Prefer the physical code (layout-independent); fall back to the key char if it's missing.
    let token = e.code;
    if (!token || token === "Unidentified") token = e.key.length === 1 ? e.key.toUpperCase() : "";
    if (!token) return;                                // couldn't identify the key — keep waiting
    set([...mods, token].join("+"));
    stop();
  });
}
bindShortcut(document.getElementById("hk-jump"), () => hkJump, v => hkJump = v);
bindShortcut(document.getElementById("hk-new"),  () => hkNew,  v => hkNew  = v);

listen("sessions", e => { sessions = e.payload; render(); });
setInterval(() => {                                   // tick ages between pushes
  document.querySelectorAll(".row .meta").forEach((m, i) => {
    if (sessions[i]) m.textContent = metaFor(sessions[i]);
  });
}, 1000);
refresh();
</script>
</body>
</html>
