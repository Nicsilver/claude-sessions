<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>menu</title>
<style>
  /* Tray menu, matching WpfTrayMenu.cs: dark rounded panel, rounded hover, state dots. */
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; cursor:default; }
  html, body { background:transparent; overflow:hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #panel {
    margin:12px;                              /* shadow gutter */
    background:rgba(43,43,43,.97);
    border:1px solid #3A3A3A;
    border-radius:8px;
    padding:4px;
    box-shadow:0 2px 9px rgba(0,0,0,.5), 0 1px 3px rgba(0,0,0,.4);
    width:200px;
  }
  .item {
    display:flex; align-items:center; gap:9px;
    padding:6px 8px; margin:1px 0;
    border-radius:6px; font-size:13px; color:#ECECEC;
    white-space:nowrap; overflow:hidden;
  }
  .item .label { flex:1; overflow:hidden; text-overflow:ellipsis; }
  .item:not(.disabled):hover { background:#3D3D3D; }
  .item.disabled { color:#8E8E93; }
  .dot { width:10px; height:10px; border-radius:50%; flex:none; }
  .spacer { width:10px; flex:none; }           /* aligns labels with dot rows */
  .sep { height:1px; background:#3A3A3A; margin:4px 8px; }
</style>
</head>
<body>
<div id="panel"></div>
<script>
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;
const appWindow = window.__TAURI__.window.getCurrentWindow();
const { PhysicalPosition, PhysicalSize } = window.__TAURI__.dpi;

const COLORS = {
  needs: "#FF453A", yourturn: "#FFD60A", working: "#34C759",
  done: "#8E8E93", idle: "#5A5A5E",
};

function item(label, { dot, disabled, onclick } = {}) {
  const el = document.createElement("div");
  el.className = "item" + (disabled ? " disabled" : "");
  const icon = document.createElement("div");
  icon.className = dot ? "dot" : "spacer";
  if (dot) icon.style.background = dot;
  const text = document.createElement("div");
  text.className = "label";
  text.textContent = label;
  el.append(icon, text);
  if (!disabled && onclick) {
    el.addEventListener("click", () => { appWindow.hide(); onclick(); });
  }
  return el;
}

function sep() {
  const el = document.createElement("div");
  el.className = "sep";
  return el;
}

async function open(payload) {
  const panel = document.getElementById("panel");
  panel.innerHTML = "";

  if (!payload.sessions.length) {
    panel.appendChild(item("No active sessions", { disabled: true }));
  }
  for (const s of payload.sessions) {
    panel.appendChild(item(s.topic, {
      dot: COLORS[s.state] || COLORS.idle,
      onclick: () => invoke("jump", { terminal: s.terminal, termPid: s.term_pid, pid: s.pid,
                                      tabTitle: s.tab_title || "", topic: s.topic || "" }),
    }));
  }
  panel.appendChild(sep());
  panel.appendChild(item("Show / hide dashboard", { onclick: () => invoke("menu_action", { id: "toggle" }) }));
  panel.appendChild(item("New Claude session", { onclick: () => invoke("new_session") }));
  if (payload.markers_missing) {
    panel.appendChild(item("Add turn markers to CLAUDE.md", { onclick: () => invoke("menu_action", { id: "markers" }) }));
  }
  panel.appendChild(sep());
  panel.appendChild(item("Quit", { onclick: () => invoke("menu_action", { id: "quit" }) }));

  // Size the window to the content, then pop up-left of the cursor, clamped to the monitor.
  const sf = window.devicePixelRatio;
  const r = panel.getBoundingClientRect();
  const w = Math.ceil((r.width + 24) * sf);
  const h = Math.ceil((r.height + 24) * sf);
  await appWindow.setSize(new PhysicalSize(w, h));
  const m = payload.monitor;
  let x = payload.x - w + 12 * sf;             // right edge (minus gutter) at the cursor
  let y = payload.y - h + 8 * sf;              // opens upward (tray lives at the bottom)
  if (m) {
    x = Math.min(Math.max(x, m.x), m.x + m.w - w);
    y = Math.min(Math.max(y, m.y), m.y + m.h - h);
  }
  await appWindow.setPosition(new PhysicalPosition(Math.round(x), Math.round(y)));
  await appWindow.show();
  await appWindow.setFocus();
}

listen("menu-open", e => open(e.payload));
window.addEventListener("blur", () => appWindow.hide());
window.addEventListener("keydown", e => { if (e.key === "Escape") appWindow.hide(); });
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
