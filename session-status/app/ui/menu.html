<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>menu</title>
<style>
  /* Tray menu: rounded panel, rounded hover, state dots. Themed like index.html —
     :root is dark, [data-theme=light] overrides; the theme arrives in the menu-open payload. */
  :root {
    --menu-bg:rgba(16,16,18,.97);
    --menu-border:rgba(255,255,255,.11);
    --menu-shadow:0 4px 12px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.45);
    --text:#F5F5F7;
    --disabled:#8A8A90;
    --hover:rgba(255,255,255,.1);
    --sep:#232326;
    --c-needs:255,69,58; --c-yourturn:255,214,10; --c-working:52,199,89;
    --c-done:142,142,147; --c-idle:90,90,94;
  }
  [data-theme="light"] {
    /* "Warm paper", matching index.html's light theme. */
    --menu-bg:rgba(250,248,244,.97);
    --menu-border:rgba(60,45,20,.15);
    --menu-shadow:0 4px 12px rgba(0,0,0,.18), 0 1px 3px rgba(0,0,0,.1);
    --text:#2A2622;
    --disabled:#A29A8E;
    --hover:rgba(60,45,20,.06);
    --sep:#E8E4DC;
    --c-needs:215,0,21; --c-yourturn:240,160,0; --c-working:30,125,58;
    --c-done:110,110,115; --c-idle:142,142,147;
  }
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; cursor:default; }
  html, body { background:transparent; overflow:hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #panel {
    margin:12px;                              /* shadow gutter */
    background:var(--menu-bg);
    border:1px solid var(--menu-border);
    border-radius:8px;
    padding:4px;
    box-shadow:var(--menu-shadow);
    width:200px;
  }
  .item {
    display:flex; align-items:center; gap:9px;
    padding:6px 8px; margin:1px 0;
    border-radius:6px; font-size:13px; color:var(--text);
    white-space:nowrap; overflow:hidden;
  }
  .item .label { flex:1; overflow:hidden; text-overflow:ellipsis; }
  .item:not(.disabled):hover { background:var(--hover); }
  .item.disabled { color:var(--disabled); }
  .dot { width:10px; height:10px; border-radius:50%; flex:none; }
  .spacer { width:10px; flex:none; }           /* aligns labels with dot rows */
  .sep { height:1px; background:var(--sep); margin:4px 8px; }
</style>
</head>
<body>
<div id="panel"></div>
<script>
const { invoke } = window.__TAURI__.core;
const { listen } = window.__TAURI__.event;
const appWindow = window.__TAURI__.window.getCurrentWindow();
const { PhysicalPosition, PhysicalSize } = window.__TAURI__.dpi;

// State colours come from the active theme's CSS variables (set by applyTheme).
const COLORS = {};
function applyTheme(mode) {
  const dark = (mode || "system") === "system"
    ? window.matchMedia("(prefers-color-scheme: dark)").matches
    : mode === "dark";
  document.documentElement.dataset.theme = dark ? "dark" : "light";
  const cs = getComputedStyle(document.documentElement);
  for (const k of ["needs", "yourturn", "working", "done", "idle"]) {
    COLORS[k] = `rgb(${cs.getPropertyValue("--c-" + k).trim()})`;
  }
}

function item(label, { dot, disabled, onclick } = {}) {
  const el = document.createElement("div");
  el.className = "item" + (disabled ? " disabled" : "");
  const icon = document.createElement("div");
  icon.className = dot ? "dot" : "spacer";
  if (dot) icon.style.background = dot;
  const text = document.createElement("div");
  text.className = "label";
  text.textContent = label;
  el.append(icon, text);
  if (!disabled && onclick) {
    el.addEventListener("click", () => { appWindow.hide(); onclick(); });
  }
  return el;
}

function sep() {
  const el = document.createElement("div");
  el.className = "sep";
  return el;
}

async function open(payload) {
  applyTheme(payload.theme);
  const panel = document.getElementById("panel");
  panel.innerHTML = "";

  if (!payload.sessions.length) {
    panel.appendChild(item("No active sessions", { disabled: true }));
  }
  for (const s of payload.sessions) {
    panel.appendChild(item(s.topic, {
      dot: COLORS[s.state] || COLORS.idle,
      onclick: () => invoke("jump", { id: s.id }),
    }));
  }
  panel.appendChild(sep());
  panel.appendChild(item("Show / hide dashboard", { onclick: () => invoke("menu_action", { id: "toggle" }) }));
  panel.appendChild(item("New Claude session", { onclick: () => invoke("new_session") }));
  if (payload.markers_missing) {
    panel.appendChild(item("Add turn markers to CLAUDE.md", { onclick: () => invoke("menu_action", { id: "markers" }) }));
  } else if (payload.markers_outdated) {
    panel.appendChild(item("Update turn markers in CLAUDE.md", { onclick: () => invoke("menu_action", { id: "markers" }) }));
  }
  panel.appendChild(sep());
  panel.appendChild(item("Quit", { onclick: () => invoke("menu_action", { id: "quit" }) }));

  // Size the window to the content, then pop up-left of the cursor, clamped to the monitor.
  const sf = window.devicePixelRatio;
  const r = panel.getBoundingClientRect();
  const w = Math.ceil((r.width + 24) * sf);
  const h = Math.ceil((r.height + 24) * sf);
  await appWindow.setSize(new PhysicalSize(w, h));
  const m = payload.monitor;
  let x = payload.x - w + 12 * sf;             // right edge (minus gutter) at the cursor
  let y = payload.y - h + 8 * sf;              // opens upward (Windows tray lives at the bottom)
  if (m && y < m.y) y = payload.y - 4 * sf;    // would poke above the screen (mac menu bar) → open downward
  if (m) {
    x = Math.min(Math.max(x, m.x), m.x + m.w - w);
    y = Math.min(Math.max(y, m.y), m.y + m.h - h);
  }
  await appWindow.setPosition(new PhysicalPosition(Math.round(x), Math.round(y)));
  await appWindow.show();
  await appWindow.setFocus();
}

listen("menu-open", e => open(e.payload));
window.addEventListener("blur", () => appWindow.hide());
window.addEventListener("keydown", e => { if (e.key === "Escape") appWindow.hide(); });
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
</body>
</html>
